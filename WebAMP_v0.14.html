<!doctype html>
<html lang="de">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WebAMP v0.14</title>
  <style>
    html,
    body,
    #app {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #e7e7d0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #avs-canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #000
    }

    #track-title {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 104px;
      text-align: center;
      pointer-events: none;
      color: #e8e8e8;
      font-family: "MS Sans Serif", "Small Fonts", Tahoma, Arial, sans-serif;
      font-size: clamp(22px, 3.1vw, 42px);
      font-style: italic;
      font-weight: 700;
      letter-spacing: -.045em;
      text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 0 0 6px #fff;
      opacity: .95;
      z-index: 5;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 0 18vw;
    }

    #track-title:empty {
      display: none
    }

    #controls {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 8;
      display: grid;
      grid-template-columns: auto auto auto auto auto auto auto auto 1fr;
      gap: 7px;
      align-items: center;
      padding: 10px 12px;
      background: #000000d0;
      border: 1px solid rgba(220, 240, 80, .42);
      box-shadow: 0 0 18px #dcf05030;
    }

    #brand {
      font-weight: 700;
      color: #eef3ac;
      white-space: nowrap;
      margin-right: 5px
    }

    #status {
      color: #bfc7a5;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px
    }

    #audio {
      display: none
    }

    #audio-file {
      display: none
    }

    button,
    .gui-button,
    input::file-selector-button {
      border: 1px solid #9da735;
      background: #1e230d;
      color: #eef3ac;
      padding: 6px 10px;
      min-height: 30px;
      font: 700 12px/1 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: .02em;
      cursor: pointer;
    }

    button:hover,
    .gui-button:hover {
      background: #2b3410;
      color: #fff;
      border-color: #dcf050
    }

    button:active,
    .gui-button:active {
      transform: translateY(1px)
    }

    button.active {
      background: #5d641a;
      color: #fff;
      border-color: #f3ff70;
      box-shadow: 0 0 10px rgba(220, 240, 80, .35) inset, 0 0 8px rgba(220, 240, 80, .22)
    }

    button:disabled {
      opacity: .45;
      cursor: not-allowed;
      transform: none;
      background: #15180b;
      color: #858d5a
    }

    #add-files {
      margin-left: 2px
    }

    #playlist-box {
      position: fixed;
      right: 12px;
      top: 12px;
      width: min(430px, calc(100vw - 24px));
      max-height: 46vh;
      z-index: 7;
      color: #e7e7d0;
      background: #000000bf;
      border: 1px solid rgba(220, 240, 80, .38);
      box-shadow: 0 0 18px #dcf05026;
      font-size: 13px;
      overflow: hidden;
    }

    #playlist-head {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 8px 10px;
      background: #1e230ddc;
      color: #eef3ac;
      border-bottom: 1px solid rgba(220, 240, 80, .26);
      user-select: none;
    }

    #playlist-toggle {
      padding: 5px 8px;
      min-height: 25px;
      min-width: 34px
    }

    #playlist-title {
      font-weight: 700;
      white-space: nowrap
    }

    #playlist-hint {
      color: #bfc7a5;
      font-size: 12px;
      text-align: right;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    #playlist-box.drag-over,
    #playlist-box:hover {
      border-color: #dcf050;
      box-shadow: 0 0 24px #dcf05047
    }

    #playlist-body {
      display: block;
      max-height: calc(46vh - 42px);
      overflow: hidden;
      transition: max-height .15s ease, opacity .15s ease
    }

    #playlist-box.collapsed #playlist-body {
      max-height: 0;
      opacity: 0
    }

    #playlist {
      margin: 0;
      padding: 0;
      list-style: none;
      max-height: calc(46vh - 42px);
      overflow: auto
    }

    #playlist-empty {
      padding: 14px 12px;
      color: #9ca789;
      background: #050805d9;
      border-top: 1px solid rgba(255, 255, 255, .08)
    }

    #playlist.has-tracks+#playlist-empty {
      display: none
    }

    #playlist li {
      display: grid;
      grid-template-columns: 36px 1fr 32px;
      align-items: center;
      gap: 4px;
      border-top: 1px solid rgba(255, 255, 255, .08);
      background: #050805d9
    }

    #playlist li.active {
      background: #102510f0;
      box-shadow: inset 3px 0 0 #6dff6d
    }

    .playlist-play,
    .playlist-name,
    .playlist-remove {
      border: 0;
      background: transparent;
      color: #dfeee0;
      padding: 8px 6px;
      text-align: left;
      min-width: 0;
      min-height: 30px
    }

    .playlist-play,
    .playlist-remove {
      text-align: center;
      color: #eef3ac
    }

    .playlist-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 500;
      letter-spacing: 0
    }

    .playlist-play:hover,
    .playlist-name:hover,
    .playlist-remove:hover {
      background: #dcf05026;
      color: #fff
    }

    #drop-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 20;
      background: rgba(0, 0, 0, .62);
      border: 3px dashed rgba(220, 240, 80, .85);
      color: #eef3ac;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: clamp(22px, 4vw, 48px);
      font-weight: 800;
      text-shadow: 0 0 12px #000;
      pointer-events: none
    }

    body.drag-active #drop-overlay {
      display: flex
    }

    @media (max-width: 1120px) {
      #controls {
        grid-template-columns: repeat(8, auto);
        align-items: stretch
      }

      #brand,
      #status {
        grid-column: 1/-1
      }

      #status {
        white-space: normal
      }
    }

    @media (max-width: 720px) {
      #controls {
        grid-template-columns: repeat(4, 1fr);
        gap: 6px
      }

      #brand,
      #status {
        grid-column: 1/-1
      }

      button,
      .gui-button {
        padding: 7px 6px;
        font-size: 11px
      }

      #playlist-box {
        top: auto;
        bottom: 150px;
        left: 12px;
        right: 12px;
        width: auto;
        max-height: 32vh
      }

      #playlist-body,
      #playlist {
        max-height: calc(32vh - 42px)
      }

      #track-title {
        bottom: 185px;
        padding: 0 8vw
      }
    }
  </style>
</head>

<body>
  <main id="app">
    <canvas id="avs-canvas"></canvas>

    <div id="track-title"></div>
    <div id="drop-overlay">Audio-Dateien fallen lassen<br><small>werden zur PlayList hinzugefügt</small></div>

    <aside id="playlist-box" class="collapsed" aria-label="PlayList">
      <div id="playlist-head">
        <button id="playlist-toggle" type="button" aria-expanded="false" title="PlayList ein-/ausklappen">▸</button>
        <div id="playlist-title">PlayList</div>
        <div id="playlist-hint">Drag & Drop Audio</div>
      </div>
      <div id="playlist-body">
        <ol id="playlist"></ol>
        <div id="playlist-empty">Noch keine Tracks. Dateien hier hineinziehen oder ADD FILES benutzen.</div>
      </div>
    </aside>

    <div id="controls">
      <div id="brand">WebAMP
        <button id="last" type="button"> ⏮ </button>
        <button id="play" type="button"> ▶ </button>
        <button id="pause" type="button"> ❚❚ </button>
        <button id="next" type="button"> ⏭ </button>
        <button id="stop" type="button"> ⏹ </button>
        <button id="repeat" type="button" aria-pressed="false"> 🔁 </button>
        <button id="repeat-all" type="button" aria-pressed="false"> 🔂 </button>
        <button id="add-files" type="button">➕</button>
      </div>
      <button id="goFS" onclick="toggleFullScreen()"> ⛶ </button>
      <span id="status">Audios per Drag & Drop hinzufügen.</span>
      <input id="audio-file" type="file" accept="audio/*" multiple>
      <audio id="audio" preload="metadata"></audio>
    </div>
  </main>

  <script>
    function toggleFullScreen() {
      var doc = window.document;
      var docEl = doc.documentElement;
      var requestFullScreen = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
      var cancelFullScreen = doc.exitFullscreen || doc.mozCancelFullScreen || doc.webkitExitFullscreen || doc.msExitFullscreen;

      if (!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) {
        requestFullScreen.call(docEl);
      }
      else {
        cancelFullScreen.call(doc);
      }
    }
  </script>

        window.addEventListener(type, event => {
          preventDefaultDrag(event);
          if (type === "dragenter") dragDepth++;
          document.body.classList.add("drag-active");
          playlistBox.classList.add("drag-over");
        });
      });

      window.addEventListener("dragleave", event => {
        preventDefaultDrag(event);
        dragDepth = Math.max(0, dragDepth - 1);
        if (dragDepth === 0) {
          document.body.classList.remove("drag-active");
          playlistBox.classList.remove("drag-over");
        }
      });

      window.addEventListener("drop", event => {
        preventDefaultDrag(event);
        dragDepth = 0;
        document.body.classList.remove("drag-active");
        playlistBox.classList.remove("drag-over");
        addFiles(event.dataTransfer && event.dataTransfer.files, { playIfIdle: false });
      });

      document.addEventListener("keydown", event => {
        if (event.target && ["INPUT", "TEXTAREA", "SELECT", "BUTTON"].includes(event.target.tagName)) return;
        if (event.code === "Space") { event.preventDefault(); audio.paused ? playCurrentOrFirst() : pauseCurrent(); }
        if (event.code === "ArrowRight") nextTrack();
        if (event.code === "ArrowLeft") lastTrack();
      });

      setTitle(null);
      setPlaylistCollapsed(true);
      renderPlaylist();
    })();
  </script>
</body>

</html>
